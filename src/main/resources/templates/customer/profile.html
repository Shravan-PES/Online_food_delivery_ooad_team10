<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Profile – OFDS</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<div class="navbar">
  <a class="brand" href="#">🍔 OFDS</a>
  <nav>
    <a th:href="@{/customer/dashboard}">Home</a>
    <a th:href="@{/customer/restaurants}">Restaurants</a>
    <a th:href="@{/customer/orders}">My Orders</a>
    <a th:href="@{/customer/profile}" class="active">Profile</a>
  </nav>
  <form method="post" th:action="@{/logout}" style="display:inline">
    <button class="logout">Logout</button>
  </form>
</div>
<div class="container">
  <p class="page-title">My Profile</p>
  <div th:if="${param.updated}" class="alert alert-success">Profile updated successfully!</div>
  <div class="card" style="max-width:520px">
    <form method="post" th:action="@{/customer/profile/update}">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" th:value="${customer.name}" required/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" th:value="${customer.email}" disabled style="background:#f0f0f0"/>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" th:value="${customer.phone}"/>
      </div>
      <div class="form-group">
        <label>Delivery Address</label>
        <input type="text" name="address" th:value="${customer.address}"/>
      </div>
      <button class="btn btn-primary" type="submit">Update Profile</button>
    </form>
  </div>
</div>
</body>
</html>
