<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Restaurants – OFDS</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<div class="navbar">
  <a class="brand" href="#">🍔 OFDS</a>
  <nav>
    <a th:href="@{/customer/dashboard}">Home</a>
    <a th:href="@{/customer/restaurants}" class="active">Restaurants</a>
    <a th:href="@{/customer/orders}">My Orders</a>
    <a th:href="@{/customer/profile}">Profile</a>
  </nav>
  <form method="post" th:action="@{/logout}" style="display:inline">
    <button class="logout">Logout</button>
  </form>
</div>
<div class="container">
  <p class="page-title">Browse Restaurants</p>
  <form th:action="@{/customer/restaurants}" method="get" class="search-bar">
    <input type="text" name="search" th:value="${search}" placeholder="Search by restaurant name…"/>
    <button class="btn btn-primary" type="submit">Search</button>
    <a th:href="@{/customer/restaurants}" class="btn btn-outline">Clear</a>
  </form>
  <div class="grid-3">
    <!-- FIX: wrap card in <a> tag instead of th:onclick -->
    <a th:each="r : ${restaurants}"
       th:href="@{/customer/restaurant/{id}/menu(id=${r.restaurantId})}"
       class="rest-card" style="text-decoration:none;display:block">
      <h3 th:text="${r.name}">Restaurant</h3>
      <p class="address">📍 <span th:text="${r.address}">Address</span></p>
      <span class="rating" th:text="${#numbers.formatDecimal(r.rating,1,1)} + ' ★'">0.0 ★</span>
      <div style="margin-top:.7rem">
        <span class="btn btn-primary btn-sm">View Menu →</span>
      </div>
    </a>
  </div>
  <div th:if="${#lists.isEmpty(restaurants)}" class="empty-state">
    <div class="icon">🔍</div>
    <p>No restaurants found.</p>
  </div>
</div>
</body>
</html>
