<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Delivery Dashboard – OFDS</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<div class="navbar">
  <a class="brand" href="#">🍔 OFDS</a>
  <nav>
    <a th:href="@{/delivery/dashboard}" class="active">Dashboard</a>
    <a th:href="@{/delivery/requests}">Requests</a>
    <a th:href="@{/delivery/orders}">My Deliveries</a>
    <a th:href="@{/delivery/profile}">Profile</a>
  </nav>
  <form method="post" th:action="@{/logout}" style="display:inline">
    <button class="logout">Logout</button>
  </form>
</div>
<div class="container">
  <p class="page-title">Welcome, <span th:text="${partner.name}">Partner</span> 🛵</p>
  <div th:if="${param.accepted}"  class="alert alert-success">Delivery task accepted!</div>
  <div th:if="${param.delivered}" class="alert alert-success">Order marked as delivered!</div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-val" th:text="${#lists.size(myOrders)}">0</div>
      <div class="stat-label">My Deliveries</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" th:text="${#lists.size(requests)}">0</div>
      <div class="stat-label">Open Requests</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" th:text="${partner.availabilityStatus ? 'Available' : 'Busy'}">-</div>
      <div class="stat-label">Status</div>
    </div>
  </div>

  <!-- Open delivery requests -->
  <div class="card">
    <div class="card-title">Open Delivery Requests</div>
    <div th:if="${#lists.isEmpty(requests)}" class="empty-state" style="padding:1.5rem">
      <p>No delivery requests right now.</p>
    </div>
    <div th:each="order : ${requests}" style="display:flex;justify-content:space-between;align-items:center;padding:.7rem 0;border-bottom:1px solid var(--border)">
      <div>
        <strong>Order #<span th:text="${order.orderId}"></span></strong>
        — <span th:text="${order.restaurant.name}"></span>
        <div style="font-size:.84rem;color:var(--text-muted)">
          Customer: <span th:text="${order.customer.name}"></span>
          · ₹<span th:text="${#numbers.formatDecimal(order.totalAmount,1,2)}"></span>
        </div>
      </div>
      <form method="post" th:action="@{/delivery/order/{id}/accept(id=${order.orderId})}">
        <button class="btn btn-success btn-sm"
                th:disabled="${!partner.availabilityStatus}">Accept</button>
      </form>
    </div>
  </div>

  <!-- Active deliveries -->
  <div class="card" style="margin-top:1rem">
    <div class="card-title">My Active Deliveries</div>
    <div th:if="${#lists.isEmpty(myOrders)}" class="empty-state" style="padding:1.5rem">
      <p>No assigned orders yet.</p>
    </div>
    <div th:each="order : ${myOrders}" style="display:flex;justify-content:space-between;align-items:center;padding:.7rem 0;border-bottom:1px solid var(--border)">
      <div>
        <strong>Order #<span th:text="${order.orderId}"></span></strong>
        — <span th:text="${order.restaurant.name}"></span>
        <div style="font-size:.84rem;color:var(--text-muted)" th:text="${order.customer.address}"></div>
      </div>
      <div style="display:flex;align-items:center;gap:.6rem">
        <span th:class="${'badge badge-' + #strings.toLowerCase(order.status)}"
              th:text="${order.status}"></span>
        <form th:if="${order.status.name() == 'OUT_FOR_DELIVERY'}" method="post"
              th:action="@{/delivery/order/{id}/deliver(id=${order.orderId})}">
          <button class="btn btn-primary btn-sm">Mark Delivered</button>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>
