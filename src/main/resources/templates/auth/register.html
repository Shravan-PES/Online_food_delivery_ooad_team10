<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<title>Register – OFDS</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">🍔 OFDS</div>
    <h1>Create account</h1>
    <p class="subtitle">Join as a Customer, Restaurant Owner, or Delivery Partner</p>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form method="post" action="/register" id="regForm">
      <div class="form-group">
        <label>I am a...</label>
        <div class="role-tabs">
          <div class="role-tab active" onclick="setRole('CUSTOMER',this)">Customer</div>
          <div class="role-tab" onclick="setRole('RESTAURANT_OWNER',this)">Restaurant Owner</div>
          <div class="role-tab" onclick="setRole('DELIVERY_PARTNER',this)">Delivery Partner</div>
        </div>
        <input type="hidden" name="role" id="roleInput" value="CUSTOMER"/>
      </div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Your name" required/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" placeholder="10-digit number" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Min 6 chars" required/>
      </div>
      <div class="form-group" id="addressGroup">
        <label>Delivery Address</label>
        <input type="text" name="address" placeholder="Your address"/>
      </div>
      <div class="form-group" id="vehicleGroup" style="display:none">
        <label>Vehicle Type</label>
        <select name="vehicleType">
          <option th:each="v : ${vehicleTypes}" th:value="${v}" th:text="${v}"></option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem">Register</button>
    </form>
    <p style="text-align:center;margin-top:1rem;font-size:.9rem;color:var(--text-muted)">
      Already have an account? <a th:href="@{/login}" style="color:var(--primary)">Sign in</a>
    </p>
  </div>
</div>
<script>
function setRole(role, el) {
  document.getElementById('roleInput').value = role;
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('addressGroup').style.display = (role === 'CUSTOMER') ? '' : 'none';
  document.getElementById('vehicleGroup').style.display  = (role === 'DELIVERY_PARTNER') ? '' : 'none';
}
</script>
</body>
</html>
