spring.application.name=ofds

# ─── MySQL Database ───────────────────────────────────────────────
# Make sure MySQL is running and the database 'ofds_db' exists.
# Run this once in MySQL before starting the app:
#   CREATE DATABASE ofds_db;
spring.datasource.url=jdbc:mysql://localhost:3306/ofds_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Shravan@123

# ─── JPA / Hibernate ──────────────────────────────────────────────
# 'update'  → keeps existing data, adds new columns/tables on restart
# 'create'  → drops and recreates all tables on every restart (use for fresh start)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ─── Thymeleaf ────────────────────────────────────────────────────
spring.thymeleaf.cache=false

# ─── Server ───────────────────────────────────────────────────────
server.port=8080

# Suppress open-in-view warning
spring.jpa.open-in-view=false

# Remove dialect warning - let Hibernate auto-detect
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect